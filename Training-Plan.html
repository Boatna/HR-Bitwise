<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>บันทึกลืมบัตรพนักงาน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .main-card {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      border-top: 5px solid #0d6efd;
    }
    #employeeCard {
      opacity: 0;
      display: none;
      transition: opacity 0.5s ease-in-out;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      border: 1px dashed #ced4da;
    }
    .clock {
      font-size: 1rem;
      font-weight: 500;
      background: #e9ecef;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
    }
    .autocomplete-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 1000;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      border-radius: 0 0 10px 10px;
      background: white;
      border: 1px solid #dee2e6;
      border-top: none;
    }
    .autocomplete-results .list-group-item { cursor: pointer; border-left: none; border-right: none; }
    .autocomplete-results .list-group-item:hover { background-color: #e9ecef; color: #0d6efd; }
    @media (max-width: 576px) {
      body { padding: 15px 10px; display: block; }
      .main-card { padding: 20px; border-radius: 15px; }
    }
  </style>
</head>
<body>
<div class="main-card">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="mb-0 fw-bold text-primary"><i class="fa-solid fa-id-badge me-2"></i>บันทึกลืมบัตร</h5>
    <div>
      <a href="dashboard.html" class="btn btn-warning btn-sm rounded-pill shadow-sm me-1"><i class="fa-solid fa-chart-pie"></i></a>
      <a href="data.html" class="btn btn-outline-secondary btn-sm rounded-pill shadow-sm"><i class="fa-solid fa-table-list"></i> ดูข้อมูล</a>
    </div>
  </div>

  <div class="text-center mb-4">
    <div class="clock" id="clockDisplay"><i class="fa-regular fa-clock me-1"></i>--:--:--</div>
  </div>

  <form id="recordForm" onsubmit="event.preventDefault(); submitForm();">
    <div class="mb-4 position-relative">
      <div class="d-flex justify-content-between align-items-end mb-2">
        <label class="form-label fw-bold mb-0">ค้นหาพนักงาน</label>
        <button type="button" class="btn btn-sm btn-outline-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#addEmpModal">
          <i class="fa-solid fa-user-plus"></i> เพิ่มพนักงานใหม่
        </button>
      </div>
      <div class="input-group input-group-lg shadow-sm rounded">
        <span class="input-group-text bg-light text-primary"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input type="text" id="searchInput" class="form-control" oninput="filterEmployees()"
               placeholder="พิมพ์รหัส หรือ ชื่อ-สกุล..." autocomplete="off" disabled>
      </div>
      <div id="autocompleteResults" class="list-group autocomplete-results"></div>
      <div id="searchStatus" class="form-text text-warning mt-2">
        <div class="spinner-border spinner-border-sm me-1"></div> กำลังโหลดฐานข้อมูล...
      </div>
    </div>

    <div id="employeeCard" class="mb-4 shadow-sm">
      <div class="row g-2">
        <div class="col-6"><label class="small text-muted">รหัส</label><input type="text" id="empId" class="form-control form-control-sm bg-white" readonly></div>
        <div class="col-6"><label class="small text-muted">ชื่อ-สกุล</label><input type="text" id="empName" class="form-control form-control-sm bg-white" readonly></div>
        <div class="col-6"><label class="small text-muted">แผนก</label><input type="text" id="empDept" class="form-control form-control-sm bg-white" readonly></div>
        <div class="col-6"><label class="small text-muted">ตำแหน่ง</label><input type="text" id="empPos" class="form-control form-control-sm bg-white" readonly></div>
        <div class="col-12"><label class="small text-muted">Plant</label><input type="text" id="empPlant" class="form-control form-control-sm bg-white" readonly></div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow" id="submitBtn" disabled>
      <i class="fa-solid fa-floppy-disk me-2"></i>บันทึกข้อมูลลืมบัตร
    </button>
  </form>
</div>

<!-- Modal เพิ่มพนักงานใหม่ -->
<div class="modal fade" id="addEmpModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold"><i class="fa-solid fa-user-plus me-2"></i>เพิ่มพนักงานใหม่</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <form id="newEmpForm" onsubmit="event.preventDefault(); submitNewEmp();">
          <div class="row g-2">
            <div class="col-12">
              <label class="form-label small fw-bold mb-1">1. รหัสพนักงาน <span class="text-muted fw-normal">(ถ้าไม่ทราบ เว้นว่างได้)</span></label>
              <input type="text" id="newEmpId" class="form-control" placeholder="เช่น 1673231">
            </div>
            <div class="col-4 mt-3">
              <label class="form-label small fw-bold mb-1 text-danger">6. คำนำหน้า*</label>
              <select id="newPrefix" class="form-select" required onchange="autoFullName()">
                <option value="">เลือก</option>
                <option value="นาย">นาย</option>
                <option value="นาง">นาง</option>
                <option value="นางสาว">นางสาว</option>
              </select>
            </div>
            <div class="col-4 mt-3">
              <label class="form-label small fw-bold mb-1 text-danger">7. ชื่อ</label>
              <input type="text" id="newFirstName" class="form-control" required oninput="autoFullName()" placeholder="ชื่อจริง">
            </div>
            <div class="col-4 mt-3">
              <label class="form-label small fw-bold mb-1 text-danger">8. นามสกุล</label>
              <input type="text" id="newLastName" class="form-control" required oninput="autoFullName()" placeholder="นามสกุล">
            </div>
            <div class="col-12 mt-3">
              <label class="form-label small fw-bold mb-1 text-primary">2. ชื่อ-นามสกุล (สร้างอัตโนมัติ)</label>
              <input type="text" id="newFullName" class="form-control bg-white" required readonly placeholder="ระบบจะรวมชื่อให้ตรงนี้">
            </div>
            <div class="col-6 mt-3">
              <label class="form-label small fw-bold mb-1">3. แผนก</label>
              <input type="text" id="newDept" class="form-control" placeholder="">
            </div>
            <div class="col-6 mt-3">
              <label class="form-label small fw-bold mb-1">4. ตำแหน่ง</label>
              <input type="text" id="newPos" class="form-control" placeholder="">
            </div>
            <div class="col-12 mt-3 mb-2">
              <label class="form-label small fw-bold mb-1 text-danger">5. Plant</label>
              <select id="newPlant" class="form-select" required>
                <option value="">-- เลือก Plant --</option>
                <option value="Bitwise (thailand) co. ltd">Bitwise (thailand) co. ltd</option>
                <option value="Bitwise heat exchanger co. ltd">Bitwise heat exchanger co. ltd</option>
                <option value="Thai tasaki engineering co. ltd">Thai tasaki engineering co. ltd</option>
              </select>
            </div>
          </div>
          <hr>
          <div class="text-end">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
            <button type="submit" class="btn btn-primary" id="saveNewEmpBtn">
              <i class="fa-solid fa-save me-1"></i> บันทึกลงฐานข้อมูล
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let employeeData = [];
  const API_URL = "https://script.google.com/macros/s/AKfycbybdJLWgPG7wfOTswEGM-gCVD_LZpVBHs6OcJ2RbojdNtHcPiYUndD8gMGc6hDjbTT1/exec";

  async function apiGet(action) {
    const res = await fetch(`${API_URL}?action=${action}`);
    const json = await res.json();
    if (json.status !== "ok") throw new Error(json.message);
    return json.data;
  }
  async function apiPost(action, data) {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, data })
    });
    const json = await res.json();
    if (json.status !== "ok") throw new Error(json.message);
    return json.message;
  }

  // นาฬิกา
  setInterval(() => {
    const now = new Date();
    document.getElementById('clockDisplay').innerHTML =
      `<i class="fa-regular fa-clock me-1"></i>${now.toLocaleDateString('th-TH')} ${now.toLocaleTimeString('th-TH')}`;
  }, 1000);

  // โหลดรายชื่อพนักงาน
  window.onload = async function () {
    try {
      employeeData = await apiGet("getEmployees");
      document.getElementById('searchInput').disabled = false;
      document.getElementById('searchStatus').innerHTML = "<i class='fa-solid fa-circle-check'></i> โหลดสำเร็จ พร้อมใช้งาน";
      document.getElementById('searchStatus').className = "form-text text-success mt-1";
    } catch (err) {
      document.getElementById('searchStatus').innerHTML = `<i class='fa-solid fa-triangle-exclamation'></i> โหลดไม่สำเร็จ: ${err.message}`;
      document.getElementById('searchStatus').className = "form-text text-danger mt-1";
    }
  };

  function filterEmployees() {
    const inputVal = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultsContainer = document.getElementById('autocompleteResults');
    resultsContainer.innerHTML = '';
    if (!inputVal) { resultsContainer.style.display = 'none'; checkEmployee(false); return; }

    const filteredData = employeeData.filter(emp =>
      (emp.id + " " + emp.name).toLowerCase().includes(inputVal)
    );

    if (filteredData.length > 0) {
      filteredData.slice(0, 10).forEach(emp => {
        const item = document.createElement('div');
        item.className = 'list-group-item p-2';
        item.innerHTML = `<strong>${emp.id}</strong> - ${emp.name}`;
        item.onclick = () => {
          document.getElementById('searchInput').value = emp.id + " " + emp.name;
          resultsContainer.style.display = 'none';
          checkEmployee(emp);
        };
        resultsContainer.appendChild(item);
      });
    } else {
      const noMatch = document.createElement('div');
      noMatch.className = 'list-group-item text-center py-3';
      noMatch.innerHTML = `<i class="fa-solid fa-circle-xmark text-danger me-2"></i>ไม่พบข้อมูลในระบบ<br>
        <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="openAddEmpModal()">
          <i class="fa-solid fa-user-plus"></i> เพิ่มพนักงานใหม่
        </button>`;
      resultsContainer.appendChild(noMatch);
    }
    resultsContainer.style.display = 'block';

    const exactMatch = employeeData.find(emp =>
      (emp.id + " " + emp.name).toLowerCase() === inputVal
    );
    checkEmployee(exactMatch || false);
  }

  function openAddEmpModal() {
    document.getElementById('autocompleteResults').style.display = 'none';
    new bootstrap.Modal(document.getElementById('addEmpModal')).show();
  }

  document.addEventListener('click', (event) => {
    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('autocompleteResults');
    if (event.target !== searchInput && !resultsContainer.contains(event.target)) {
      resultsContainer.style.display = 'none';
    }
  });

  function checkEmployee(foundEmp) {
    const card = document.getElementById('employeeCard');
    if (foundEmp) {
      document.getElementById('empId').value    = foundEmp.id;
      document.getElementById('empName').value  = foundEmp.name;
      document.getElementById('empDept').value  = foundEmp.dept;
      document.getElementById('empPos').value   = foundEmp.pos;
      document.getElementById('empPlant').value = foundEmp.plant;
      card.style.display = 'block';
      setTimeout(() => card.style.opacity = 1, 10);
      document.getElementById('submitBtn').disabled = false;
    } else {
      card.style.opacity = 0;
      setTimeout(() => card.style.display = 'none', 300);
      document.getElementById('submitBtn').disabled = true;
      ['empId','empName','empDept','empPos','empPlant'].forEach(id =>
        document.getElementById(id).value = ''
      );
    }
  }

  async function submitForm() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังระบุตำแหน่ง...';

    const getGPS = () => new Promise((resolve) => {
      if (!navigator.geolocation) return resolve({ lat: "", lng: "" });
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        ()    => resolve({ lat: "", lng: "" }),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });

    const { lat, lng } = await getGPS();
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก...';

    const formObject = {
      empId:    document.getElementById('empId').value,
      empName:  document.getElementById('empName').value,
      empDept:  document.getElementById('empDept').value,
      empPos:   document.getElementById('empPos').value,
      empPlant: document.getElementById('empPlant').value,
      lat, lng
    };

    try {
      await apiPost("saveRecord", formObject);
      Swal.fire({
        title: '✅ บันทึกสำเร็จ!',
        html: `ข้อมูลของ <b>${formObject.empName}</b><br>ถูกบันทึกเรียบร้อยแล้ว`,
        icon: 'success',
        confirmButtonText: 'รับทราบ',
        confirmButtonColor: '#0d6efd',
        timer: 5000,
        timerProgressBar: true,
      });
      document.getElementById('recordForm').reset();
      document.getElementById('searchInput').value = '';
      checkEmployee(false);
    } catch (err) {
      Swal.fire({
        title: 'เกิดข้อผิดพลาด!',
        text: `ไม่สามารถบันทึกข้อมูลได้: ${err.message}`,
        icon: 'error',
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#dc3545'
      });
      btn.disabled = false;
    }
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk me-2"></i>บันทึกข้อมูลลืมบัตร';
  }

  function autoFullName() {
    const prefix = document.getElementById('newPrefix').value;
    const fname  = document.getElementById('newFirstName').value.trim();
    const lname  = document.getElementById('newLastName').value.trim();
    document.getElementById('newFullName').value =
      [prefix, fname, lname].filter(Boolean).join(' ');
  }

  async function submitNewEmp() {
    const btn = document.getElementById('saveNewEmpBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก...';

    const newEmpData = {
      empId:     document.getElementById('newEmpId').value.trim() || "-",
      fullName:  document.getElementById('newFullName').value.trim(),
      dept:      document.getElementById('newDept').value.trim() || "-",
      pos:       document.getElementById('newPos').value.trim() || "-",
      plant:     document.getElementById('newPlant').value,
      prefix:    document.getElementById('newPrefix').value,
      firstName: document.getElementById('newFirstName').value.trim(),
      lastName:  document.getElementById('newLastName').value.trim()
    };

    try {
      await apiPost("saveEmployee", newEmpData);
      bootstrap.Modal.getInstance(document.getElementById('addEmpModal')).hide();
      Swal.fire('สำเร็จ!', 'เพิ่มข้อมูลพนักงานใหม่สำเร็จ', 'success');
      document.getElementById('newEmpForm').reset();

      // รีโหลด employee list
      employeeData = await apiGet("getEmployees");

      // เลือกพนักงานที่เพิ่งเพิ่ม
      document.getElementById('searchInput').value = `${newEmpData.empId} ${newEmpData.fullName}`;
      checkEmployee({
        id: newEmpData.empId, name: newEmpData.fullName,
        dept: newEmpData.dept, pos: newEmpData.pos, plant: newEmpData.plant
      });
    } catch (err) {
      Swal.fire('เกิดข้อผิดพลาด!', err.message, 'error');
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-save me-1"></i> บันทึกลงฐานข้อมูล';
  }
</script>
</body>
</html>
