<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เข้าสู่ระบบ · HR Dashboard Bitwise Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F6FF;--bg2:#FFFFFF;--bg3:#EBF3FF;--bg4:#DCEEFF;
  --blue:#1D6FCC;--blue2:#2563EB;--cyan:#0EA5E9;--navy:#1E3A5F;
  --text:#0F2744;--text2:#2D5080;--text3:#4A7CB5;
  --line:rgba(29,111,204,0.10);--line2:rgba(29,111,204,0.16);
  --red:#DC2626;--green:#059669;
  --input-bg:#FFFFFF;--input-border:rgba(29,111,204,0.18);--input-focus:rgba(37,99,235,0.18);
  --shadow:0 2px 16px rgba(29,111,204,0.10);--shadow2:0 8px 32px rgba(29,111,204,0.14);
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(ellipse 70% 50% at 80% -5%,rgba(29,111,204,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at -5% 90%,rgba(14,165,233,.07) 0%,transparent 50%),
    radial-gradient(circle,rgba(29,111,204,.08) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,36px 36px;
}
.login-shell{
  position:relative;z-index:1;width:100%;max-width:920px;
  display:grid;grid-template-columns:1.05fr 1fr;align-items:center;gap:clamp(24px,4vw,56px);
}
.illust-col{display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;}
.illust-col img{width:100%;max-width:360px;filter:drop-shadow(0 18px 30px rgba(29,111,204,.22));}
.illust-headline{font-family:'DM Serif Display','Noto Sans Thai',serif;font-size:clamp(1.3rem,2.6vw,1.6rem);color:var(--navy);line-height:1.3;}
.illust-headline em{font-style:italic;background:linear-gradient(135deg,var(--blue2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.illust-sub{font-size:.85rem;color:var(--text3);max-width:320px;line-height:1.7;}

.login-wrap{width:100%;max-width:400px;margin:0 auto;}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;text-align:center;}
.brand-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--blue2),var(--cyan));
  display:grid;place-items:center;font-size:1.6rem;box-shadow:0 8px 24px rgba(37,99,235,.28);}
.brand-name{font-family:'DM Serif Display','Noto Sans Thai',serif;font-size:1.4rem;color:var(--navy);}
.brand-sub{font-size:.78rem;color:var(--text3);letter-spacing:.04em;}

.login-card{
  background:var(--bg2);border:1px solid var(--line2);border-radius:20px;
  box-shadow:var(--shadow2);padding:clamp(28px,5vw,36px);
}
.login-title{font-size:1.15rem;font-weight:700;color:var(--navy);margin-bottom:4px;}
.login-desc{font-size:.82rem;color:var(--text3);margin-bottom:24px;}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.input-wrap{position:relative;}
.input-wrap .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.95rem;pointer-events:none;}
.field input{
  width:100%;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:10px;
  padding:11px 14px 11px 42px;font-family:'Noto Sans Thai',sans-serif;font-size:.92rem;color:var(--text);
  outline:none;transition:all .2s;
}
.field input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px var(--input-focus);}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;
  font-size:.9rem;color:var(--text3);padding:4px;}
.field.error input{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(220,38,38,.12)!important;}

.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:.8rem;}
.remember{display:flex;align-items:center;gap:7px;color:var(--text2);cursor:pointer;user-select:none;}
.remember input{width:15px;height:15px;accent-color:var(--blue2);cursor:pointer;}

.alert{
  display:none;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;font-size:.82rem;font-weight:600;
  margin-bottom:16px;
}
.alert.show{display:flex;}
.alert-error{background:#FEF2F2;border:1.5px solid rgba(220,38,38,.22);color:#991B1B;}

.btn-login{
  width:100%;padding:12px;border:none;border-radius:10px;background:var(--blue2);color:#fff;
  font-family:'Noto Sans Thai',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;
  box-shadow:0 4px 16px rgba(37,99,235,.28);
}
.btn-login:hover:not(:disabled){background:var(--blue);box-shadow:0 8px 24px rgba(37,99,235,.38);transform:translateY(-2px);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .55s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.foot-note{text-align:center;font-size:.72rem;color:var(--text3);margin-top:22px;}

@media (max-width: 820px){
  .login-shell{grid-template-columns:1fr;max-width:420px;}
  .illust-col{display:none;}
}
</style>
</head>
<body>

<div class="login-shell">
  <div class="illust-col">
    <img src="IT_HR.png" alt="HR Dashboard Bitwise Group Mascot" />
    <div class="illust-headline">ข้อมูล HR <em>ครบ</em><br>ในที่เดียว</div>
    <div class="illust-sub">ระบบบริหารข้อมูลพนักงาน เข้าถึงเฉพาะผู้มีสิทธิ์</div>
  </div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">📈</div>
    <div class="brand-name">HR Bitwise Group</div>
    <div class="brand-sub">Bitwise Group</div>
  </div>

  <div class="login-card">
    <div class="login-title">เข้าสู่ระบบ</div>
    <div class="login-desc">กรอก Username และ Password เพื่อเข้าใช้งานระบบ HR</div>

    <div class="alert alert-error" id="alertBox">
      <span>⚠️</span><span id="alertMsg"></span>
    </div>

    <div class="field" id="fieldUsername">
      <label>Username</label>
      <div class="input-wrap">
        <span class="ic">👤</span>
        <input type="text" id="username" placeholder="กรอก Username" autocomplete="username" />
      </div>
    </div>

    <div class="field" id="fieldPassword">
      <label>Password</label>
      <div class="input-wrap">
        <span class="ic">🔒</span>
        <input type="password" id="password" placeholder="กรอก Password" autocomplete="current-password" />
        <button type="button" class="toggle-pass" id="togglePass">👁️</button>
      </div>
    </div>

    <div class="row-between">
      <label class="remember">
        <input type="checkbox" id="rememberMe" />
        จดจำการเข้าสู่ระบบ
      </label>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="loginIcon">🔐</span><span id="loginText">เข้าสู่ระบบ</span>
    </button>
  </div>

  <div class="foot-note">© Bitwise Group · HR Dashboard v1.0</div>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // ถ้า login ค้างอยู่แล้ว (มี session) ให้เด้งไปหน้าแรกเลย ไม่ต้อง login ซ้ำ
  const existing = getStoredUser();
  if (existing) { location.href = 'index.html'; return; }

  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('togglePass').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });
});

function getStoredUser() {
  try {
    return JSON.parse(localStorage.getItem('hrUser') || sessionStorage.getItem('hrUser') || 'null');
  } catch(_) { return null; }
}

function setFieldError(id, hasError) {
  document.getElementById(id)?.classList.toggle('error', hasError);
}

function showAlert(msg) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertBox').classList.add('show');
}
function hideAlert() {
  document.getElementById('alertBox').classList.remove('show');
}

async function doLogin() {
  hideAlert();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('rememberMe').checked;

  let hasErr = false;
  setFieldError('fieldUsername', !username); if (!username) hasErr = true;
  setFieldError('fieldPassword', !password); if (!password) hasErr = true;
  if (hasErr) { showAlert('กรุณากรอก Username และ Password ให้ครบถ้วน'); return; }

  setLoading(true);
  try {
    // ใช้ text/plain;charset=utf-8 เพื่อเลี่ยง CORS preflight เหมือน endpoint อื่นๆ ในระบบนี้
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', data: { username, password } }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });
    const json = await res.json();
    if (json.status === 'ok') {
      const store = remember ? localStorage : sessionStorage;
      store.setItem('hrUser', JSON.stringify(json.user));
      location.href = 'index.html';
    } else {
      setFieldError('fieldUsername', true);
      setFieldError('fieldPassword', true);
      showAlert(json.message || 'เข้าสู่ระบบไม่สำเร็จ');
    }
  } catch (e) {
    showAlert('เชื่อมต่อระบบไม่สำเร็จ: ' + e.message);
  }
  setLoading(false);
}

function setLoading(on) {
  document.getElementById('loginBtn').disabled = on;
  document.getElementById('loginIcon').innerHTML = on ? '<div class="spinner"></div>' : '🔐';
  document.getElementById('loginText').textContent = on ? 'กำลังเข้าสู่ระบบ…' : 'เข้าสู่ระบบ';
}
</script>
</body>
</html>
